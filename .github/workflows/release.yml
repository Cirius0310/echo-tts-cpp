name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache ONNX Runtime
        id: cache-onnx
        uses: actions/cache@v4
        with:
          path: onnxruntime-win-x64-gpu-1.25.0
          key: onnxruntime-1.25.0-win-x64-gpu-cuda12

      - name: Download ONNX Runtime
        if: steps.cache-onnx.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.25.0/onnxruntime-win-x64-gpu-1.25.0.zip" -OutFile "onnxruntime.zip"
          Expand-Archive onnxruntime.zip -DestinationPath . -Force
          Remove-Item onnxruntime.zip

      - name: Install cuDNN
        run: |
          $cudnnUrl = "https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/windows-x86_64/cudnn-windows-x86_64-9.21.0.76_cuda12-archive.zip"
          Invoke-WebRequest -Uri $cudnnUrl -OutFile "cudnn.zip" -UseBasicParsing
          Expand-Archive cudnn.zip -DestinationPath "cudnn" -Force
          Remove-Item cudnn.zip

          $cudnnBin = Get-ChildItem "cudnn" -Recurse -Directory -Filter "bin" | Select-Object -First 1
          if ($cudnnBin) {
            $env:CUDNN_PATH = $cudnnBin.Parent.FullName
            echo "CUDNN_PATH=$($cudnnBin.Parent.FullName)" >> $env:GITHUB_ENV
            # Add to PATH for runtime
            echo "$($cudnnBin.FullName)" >> $env:GITHUB_PATH
          }

      - name: Install OpenSSL
        run: |
          choco install openssl --version=3.5.0 -y --no-progress

      - name: Configure CMake
        run: |
          cmake -S cpp -B cpp/build `
            -G "Visual Studio 17 2022" `
            -DONNXRUNTIME_ROOT="${{ github.workspace }}/onnxruntime-win-x64-gpu-1.25.0" `
            -DCUDAToolkit_ROOT="C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v12.8"

      - name: Build
        run: cmake --build cpp/build --config Release --parallel

      - name: Package portable
        run: |
          .\scripts\package_portable.ps1 -BuildDir cpp/build/Release -CudaVersion 12 -WithFfmpeg:$true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Echo-TTS Portable ${{ github.ref_name }}"
          body: |
            Portable release of Echo-TTS C++ — no installation required.

            ### Included
            - `echo-tts.exe` — TTS engine (CLI + HTTP server)
            - CUDA 12.8, cuDNN 9.21, ONNX Runtime 1.25.0 runtime DLLs
            - OpenSSL 3, VC++ 2022 redistributables
            - FFmpeg portable (for MP3 output)

            ### Not included
            - Model files — download separately from [HuggingFace](https://huggingface.co/tmdarkbr/echo-tts-gguf)

            ### Quick Start
            ```bash
            # Extract and download model files
            echo-tts serve --model echo-dit.gguf --voice myvoice=myvoice.wav --dac-encoder onnx_models/dac_encoder.onnx --dac-decoder onnx_models/dac_decoder.onnx
            ```
          files: echo-tts-portable-*.zip
          draft: false
